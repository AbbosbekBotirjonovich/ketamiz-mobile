name: iOS Release to TestFlight

# 'ios-v*' tag push qilinganda ishga tushadi (Android tag'idan ajratish uchun).
# Masalan: ios-v1.0.2
on:
  push:
    tags:
      - 'ios-v*'
  workflow_dispatch:   # Actions sahifasidan qo'lda ishga tushirish

jobs:
  build-and-deploy:
    name: Build & Deploy IPA
    runs-on: macos-latest   # iOS build uchun macOS runner shart
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Apple endi App Store upload uchun iOS 26 SDK (Xcode 26+) talab qiladi.
      # Runner default'da eski Xcode tanlaydi, shuning uchun mavjud eng yangi
      # Xcode 26.x ni topib tanlaymiz.
      - name: Select Xcode 26
        run: |
          XC=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XC" ]; then
            echo "Xcode 26 topilmadi. Mavjud versiyalar:"
            ls -d /Applications/Xcode_*.app
            exit 1
          fi
          echo "Tanlanmoqda: $XC"
          sudo xcode-select -s "$XC"
          xcodebuild -version

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.9
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Setup Ruby (fastlane)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: ios

      # Flutter generated fayllar (Generated.xcconfig va h.k.) + pod install'ni
      # to'g'ri tartibda tayyorlaydi. Busiz Xcode archive darrov yiqiladi.
      - name: Prepare iOS build config
        run: flutter build ios --release --no-codesign --config-only

      # Certs repo'ga kirish uchun read-only SSH deploy key'ni ssh-agent'ga yuklaymiz.
      - name: Setup SSH deploy key for certs repo
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.MATCH_SSH_PRIVATE_KEY }}

      - name: Build & upload to TestFlight
        working-directory: ios
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_P8: ${{ secrets.APP_STORE_CONNECT_KEY_P8 }}
        run: bundle exec fastlane ios beta

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-ipa
          path: ios/*.ipa
          retention-days: 30
