name: Release to Play Store

# Runs when a tag (e.g. v1.0.2) is pushed.
# Builds a signed AAB and uploads it to Google Play (production track).
on:
  push:
    tags:
      - 'v*'   # v1.0.2, v2.0.0, etc.

jobs:
  build-and-deploy:
    name: Build & Deploy AAB
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.9
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # --- Restore the keystore from Secrets ---
      # KEYSTORE_BASE64 = base64-encoded upload-keystore.jks
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/upload-keystore.jks

      # Recreate key.properties from the passwords stored in Secrets.
      # The storeFile path must match build.gradle: ../upload-keystore.jks
      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=../upload-keystore.jks
          EOF

      - name: Build App Bundle
        run: flutter build appbundle --release

      # --- Upload to Google Play ---
      # SERVICE_ACCOUNT_JSON = full JSON of the Play Console service account key
      - name: Upload to Google Play (production)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          packageName: uz.ketamiz.app
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: production         # production track: goes to review automatically
          status: inProgress        # staged rollout, not a full release
          userFraction: 0.2         # reaches 20% of users first

      # Also keep the AAB on GitHub (backup / manual upload)
      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30
