name: CI

# Checks the code on every PR and push to main.
# No secrets needed (no keystore) — static analysis and tests only.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:   # allows running manually from the Actions tab

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.9
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Formatting mismatches don't fail CI; they're only reported in the log.
      - name: Verify formatting (warning only)
        continue-on-error: true
        run: dart format --output=none --set-exit-if-changed .

      # Fails on errors/warnings; info/deprecation only show in the log.
      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test
